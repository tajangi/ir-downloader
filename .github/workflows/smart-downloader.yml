name: '📦 حرفه‌ای: دانلود و ذخیره (نسخه بهینه)'

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: '🔗 لینک مستقیم فایل'
        required: true
        type: string
      password:
        description: '🔐 رمز فایل فشرده (اختیاری)'
        required: false
        default: ''
      split_size:
        description: '📦 حجم هر تکه'
        required: false
        default: '95m'

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ⚙️ Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full file

      # 🚀 Faster + resumable download
      - name: 📥 Download (aria2)
        run: |
          URL="${{ github.event.inputs.file_url }}"
          echo "Downloading: $URL"

          aria2c \
            -x 16 -s 16 \
            -k 1M \
            --continue=true \
            --retry-wait=5 \
            --max-tries=10 \
            --summary-interval=10 \
            -o downloaded_file \
            "$URL"

          if [ ! -f downloaded_file ]; then
            echo "❌ Download failed"
            exit 1
          fi

          ls -lh downloaded_file

      # 🧠 Smart classification
      - name: 🧠 Detect type
        run: |
          RAW_NAME=$(basename "${{ github.event.inputs.file_url }}" | sed 's/\?.*//' | sed 's/%20/ /g')
          [ -z "$RAW_NAME" ] && RAW_NAME="unknown_file"

          SAFE_NAME=$(echo "$RAW_NAME" | sed 's/[\\/:*?"<>|]/_/g')

          MIME=$(file -b --mime-type downloaded_file)
          EXT="${RAW_NAME##*.}"
          EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')

          if [[ "$MIME" == video/* ]]; then CAT="video"
          elif [[ "$MIME" == audio/* ]]; then CAT="audio"
          elif [[ "$MIME" == image/* ]]; then CAT="image"
          elif [[ "$MIME" == application/pdf ]]; then CAT="document"
          else CAT="other"
          fi

          echo "CAT=$CAT" >> $GITHUB_ENV
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV

      # ⚡ Smart compression (skip if already compressed)
      - name: 🗜️ Compress & Split
        run: |
          FINAL_DIR="downloads/${{ env.CAT }}/${{ env.SAFE_NAME }}"
          mkdir -p "$FINAL_DIR"

          FILE_TYPE=$(file downloaded_file)

          # If already archive, skip recompression
          if echo "$FILE_TYPE" | grep -Eiq 'zip|rar|7z'; then
            echo "⚡ Already compressed → just splitting"

            split -b ${{ github.event.inputs.split_size }} downloaded_file "$FINAL_DIR/part_"
          else
            echo "⚡ Compressing..."

            if [ -z "${{ github.event.inputs.password }}" ]; then
              7z a -mx=1 -mmt=on -v${{ github.event.inputs.split_size }} \
                "$FINAL_DIR/archive.7z" downloaded_file
            else
              7z a -p"${{ github.event.inputs.password }}" -mx=1 -mmt=on \
                -v${{ github.event.inputs.split_size }} \
                "$FINAL_DIR/archive.7z" downloaded_file
            fi
          fi

          ls -lh "$FINAL_DIR"

      # 🧹 Reduce repo size growth
      - name: 🧹 Clean temp
        run: rm -f downloaded_file

      - name: 📝 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add downloads/

          git commit -m "📦 ${{ env.SAFE_NAME }} [${{ env.CAT }}]" || echo "No changes"

          git push
