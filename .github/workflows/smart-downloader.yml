name: '📦 دانلود و آپلود امن (نسخه پایدار)'

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: '🔗 لینک مستقیم فایل'
        required: true
        type: string
      password:
        description: '🔐 رمز (اختیاری)'
        required: false
        default: ''
      split_size:
        description: '📦 حجم هر تکه'
        required: false
        default: '95m'

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ⚙️ Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full file

      # 🚀 FAST + RESUMABLE DOWNLOAD
      - name: 📥 Download with aria2
        run: |
          URL="${{ github.event.inputs.file_url }}"
          echo "Downloading: $URL"

          aria2c \
            -x 16 -s 16 \
            -k 1M \
            --continue=true \
            --max-tries=10 \
            --retry-wait=5 \
            -o downloaded_file \
            "$URL"

          [ ! -f downloaded_file ] && echo "Download failed" && exit 1

          ls -lh downloaded_file

      # 🧠 Detect name/type
      - name: 🧠 Detect file info
        run: |
          RAW_NAME=$(basename "${{ github.event.inputs.file_url }}" | sed 's/\?.*//' | sed 's/%20/ /g')
          [ -z "$RAW_NAME" ] && RAW_NAME="unknown_file"

          SAFE_NAME=$(echo "$RAW_NAME" | sed 's/[\\/:*?"<>|]/_/g')

          MIME=$(file -b --mime-type downloaded_file)

          if [[ "$MIME" == video/* ]]; then CAT="video"
          elif [[ "$MIME" == audio/* ]]; then CAT="audio"
          elif [[ "$MIME" == image/* ]]; then CAT="image"
          elif [[ "$MIME" == application/pdf ]]; then CAT="document"
          else CAT="other"
          fi

          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "CAT=$CAT" >> $GITHUB_ENV

      # ⚡ SPLIT (SMART)
      - name: 🧩 Split / Compress
        run: |
          FINAL_DIR="downloads/${{ env.CAT }}/${{ env.SAFE_NAME }}"
          mkdir -p "$FINAL_DIR"

          FILE_INFO=$(file downloaded_file)

          # If ISO or already compressed → don't compress
          if echo "$FILE_INFO" | grep -Eiq 'ISO|archive|compressed|zip|rar|7z'; then
            echo "⚡ Skipping compression, splitting only"
            split -b ${{ github.event.inputs.split_size }} downloaded_file "$FINAL_DIR/part_"
          else
            echo "⚡ Compressing"

            if [ -z "${{ github.event.inputs.password }}" ]; then
              7z a -mx=1 -mmt=on -v${{ github.event.inputs.split_size }} \
                "$FINAL_DIR/archive.7z" downloaded_file
            else
              7z a -p"${{ github.event.inputs.password }}" -mx=1 -mmt=on \
                -v${{ github.event.inputs.split_size }} \
                "$FINAL_DIR/archive.7z" downloaded_file
            fi
          fi

          ls -lh "$FINAL_DIR"

      - name: 🧹 Cleanup temp
        run: rm -f downloaded_file

      # 🔥 CRITICAL FIX: CHUNKED PUSH
      - name: 📤 Chunked Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git config --global http.postBuffer 524288000

          cd downloads

          COUNT=0
          LIMIT=5

          for file in $(find . -type f | sort); do
            git add "$file"
            COUNT=$((COUNT+1))

            if [ $COUNT -ge $LIMIT ]; then
              git commit -m "📦 partial upload"
              
              for i in 1 2 3; do
                git push && break || sleep 10
              done

              COUNT=0
            fi
          done

          # Final commit
          git commit -m "📦 final upload" || echo "Nothing to commit"

          for i in 1 2 3; do
            git push && break || sleep 10
          done
